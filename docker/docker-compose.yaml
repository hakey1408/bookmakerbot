services:
  db:
    image: postgres:17
    container_name: ricashdb
    environment:
      POSTGRES_DB: RicashDB
      POSTGRES_USER: ricash
      POSTGRES_PASSWORD: ricash
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ricash -d RicashDB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bot:
    build:
      # Il contesto è la root del progetto (una directory sopra docker/)
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: RicashDB
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ricash
      POSTGRES_PASSWORD: ricash
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
